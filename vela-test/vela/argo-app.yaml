apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: reference-app-vela
  namespace: argocd
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  project: default
  source:
    path: .tai/vela/
    repoURL: https://github.com/mper0003/reference-app.git
    targetRevision: main
    plugin:
      name: vela
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
