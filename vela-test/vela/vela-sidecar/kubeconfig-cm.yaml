apiVersion: v1
kind: ConfigMap
metadata:
  name: vela-kubeconfig
  namespace: argocd
data:
  config: |
    clusters:
      - cluster:
          certificate-authority-data: 
          server: https://kubernetes.default.svc
        name: k3d-k3d-local
        contexts:
          - context:
              cluster: k3d-k3d-local
              user: admin@k3d-k3d-local
            name: k3d-k3d-local
        current-context: k3d-k3d-local
        kind: Config
        preferences: {}
        users:
        - name: admin@k3d-k3d-local
          user:
            client-certificate-data: 
            client-key-data: 
