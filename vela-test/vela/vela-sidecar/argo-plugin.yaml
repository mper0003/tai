apiVersion: v1
kind: ConfigMap
metadata:
  name: vela-cmp
  namespace: argocd
data:
  plugin.yaml: |
    apiVersion: argoproj.io/v1alpha1
    kind: ConfigManagementPlugin
    metadata:
      name: vela
    spec:
      version: v1.0
      generate:
        command: ["sh", "-xc"]
        args: ["vela dry-run"]
      discover:
        fileName: "app.yaml"
