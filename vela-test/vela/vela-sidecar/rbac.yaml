apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vela-cli
  namespace: argocd
rules:
  - apiGroups: ["core.oam.dev"]
    resources: ["traitdefinitions"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vela-cli
  namespace: argocd
subjects:
  - kind: ServiceAccount
    name: argocd-repo-server
roleRef:
  kind: Role
  name: vela-cli
  apiGroup: rbac.authorization.k8s.io
